name: Deploy to GitHub Pages

# Build the static site and publish it to GitHub Pages on every push to the
# default branch. Works for both a project page (user.github.io/<repo>/) and a
# user/org page — the app uses a relative base, so no path config is needed.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not ci): tolerates the optional WASM-binding subtrees
      # (@emnapi via rolldown/Tailwind oxide) whose ranges drift and break
      # npm ci's strict cross-platform lock validation.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
